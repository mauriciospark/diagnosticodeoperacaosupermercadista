        <!-- Informações do Projeto -->

            <div class="row mt-3">
                <div class="col-md-12">
                    <label for="projectDescription" class="form-label fw-bold">Descrição do Projeto</label>
                    <textarea class="form-control" id="projectDescription" rows="4" readonly>Sistema web para diagnóstico completo da operação de supermercados, desenvolvido como trabalho acadêmico para o curso de Análise e Desenvolvimento de Sistemas. A aplicação permite coletar dados detalhados sobre a operação do estabelecimento, gerando relatórios em PDF com análises estruturadas em quatro blocos principais: Dados Gerais, Logística e Estoque, Tecnologia e Operação, e Visão de Gestão.</textarea>
                </div>
            </div>

                <div class="col-md-4">
                    <label for="developmentDate" class="form-label fw-bold">Período de Desenvolvimento</label>

            </h3>
            
            <div class="row">

                    <label for="objectives" class="form-label fw-bold">Objetivos do Projeto</label>
                    <textarea class="form-control" id="objectives" rows="6" readonly>Objetivo Geral:
Desenvolver uma ferramenta digital completa para diagnóstico operacional de supermercados, permitindo análise detalhada e geração de relatórios profissionais.

Objetivos Específicos:
- Criar interface intuitiva para coleta de dados operacionais
- Implementar sistema de gestão de equipe técnica
- Desenvolver funcionalidade de geração de PDF personalizado
- Estruturar análise em quatro blocos temáticos completos
- Aplicar conceitos de UX/UI para melhor experiência do usuário
- Implementar persistência de dados com localStorage
- Criar sistema de validação e tratamento de erros</textarea>
                </div>
                <div class="col-md-6">
                    <label for="methodology" class="form-label fw-bold">Metodologia de Desenvolvimento</label>
                    <textarea class="form-control" id="methodology" rows="6" readonly>O projeto foi desenvolvido seguindo uma abordagem iterativa e incremental, com as seguintes etapas:

1. Análise de Requisitos: Levantamento detalhado das necessidades de diagnóstico operacional de supermercados
2. Design de Interface: Criação de protótipos responsivos e acessíveis usando Bootstrap 5
3. Desenvolvimento Frontend: Implementação das funcionalidades com JavaScript vanilla
4. Integração de Bibliotecas: jsPDF para geração de relatórios e html2canvas para captura de elementos
5. Testes e Validação: Verificação de funcionalidades e experiência do usuário
6. Documentação: Elaboração de relatórios técnicos e de usuário</textarea>
                </div>
            </div>
        </div>

        <!-- Resultados e Conclusão -->

                    <textarea class="form-control" id="results" rows="6" readonly>O projeto alcançou todos os objetivos propostos, entregando:

1. Sistema Funcional: Aplicação web completa com todas as funcionalidades operando
2. Interface Profissional: Design moderno e responsivo com excelente experiência do usuário
3. Gestão de Equipe: Sistema completo para cadastro e gerenciamento de membros técnicos
4. Geração de PDF: Relatórios estruturados em 3 páginas com formatação profissional
5. Validação Robusta: Sistema completo de validação de formulários e tratamento de erros
6. Persistência de Dados: Salvamento automático no localStorage
7. Documentação Completa: Código comentado e relatórios detalhados</textarea>
                </div>
                <div class="col-md-6">
                    <label for="conclusion" class="form-label fw-bold">Conclusão da Equipe</label>
                    <textarea class="form-control" id="conclusion" rows="6" readonly>O projeto "Diagnóstico de Operação Supermercadista" representa uma solução completa e profissional para análise operacional de estabelecimentos comerciais do setor. 

Durante o desenvolvimento, foi possível aplicar de forma prática todos os conceitos aprendidos no curso de Análise e Desenvolvimento de Sistemas, desde design de interfaces até programação JavaScript avançada.

A solução atende plenamente aos requisitos propostos, oferecendo uma ferramenta robusta, intuitiva e eficiente que pode ser utilizada em contextos reais de negócio. O sistema demonstra domínio técnico das tecnologias web modernas e capacidade de desenvolver soluções complexas e bem estruturadas.

Este projeto representa não apenas uma entrega acadêmica, mas uma aplicação real com potencial de uso comercial e contribuição efetiva para o setor supermercadista.</textarea>

    <script>
        let memberCount = 4;

        function addTeamMember() {
            memberCount++;
            const container = document.getElementById('teamMembersContainer');
            
            const newMember = document.createElement('div');
            newMember.className = 'team-member';
            newMember.innerHTML = `
                <div class="row align-items-center">
                    <div class="col-auto">
                        <div class="member-avatar">${memberCount}</div>
                    </div>
                    <div class="col">
                        <div class="row">
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Nome Completo</label>
                                <input type="text" class="form-control member-name" placeholder="Nome do membro ${memberCount}">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Registro Acadêmico (RA)</label>
                                <input type="text" class="form-control member-ra" placeholder="Ex: 202310123${memberCount}">
                            </div>
                            <div class="col-md-4">
                                <label class="form-label fw-bold">Função na Equipe</label>
                                <select class="form-select member-role">
                                    <option value="">Selecione...</option>
                                    <option value="Desenvolvedor Frontend">Desenvolvedor Frontend</option>
                                    <option value="Desenvolvedor Backend">Desenvolvedor Backend</option>
                                    <option value="Designer UI/UX">Designer UI/UX</option>
                                    <option value="Analista de Sistemas">Analista de Sistemas</option>
                                    <option value="Gerente de Projeto">Gerente de Projeto</option>
                                    <option value="QA Tester">QA Tester</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            container.appendChild(newMember);
        }

        function saveCollectiveReport() {
            const members = [];
            document.querySelectorAll('.team-member').forEach((member, index) => {
                members.push({
                    number: index + 1,
                    name: member.querySelector('.member-name').value,
                    ra: member.querySelector('.member-ra').value,
                    role: member.querySelector('.member-role').value
                });
            });

            const data = {
                teamName: document.getElementById('teamName').value,
                members: members,
                objectives: document.getElementById('objectives').value,
                methodology: document.getElementById('methodology').value,
                results: document.getElementById('results').value,
                conclusion: document.getElementById('conclusion').value,
                savedAt: new Date().toISOString()
            };
            
            localStorage.setItem('relatorioColetivo', JSON.stringify(data));
            alert('Relatório coletivo salvo com sucesso!');
        }

        function loadCollectiveReport() {
            const saved = localStorage.getItem('relatorioColetivo');
            if (saved) {
                const data = JSON.parse(saved);
                document.getElementById('teamName').value = data.teamName || '';
                
                if (data.members) {
                    data.members.forEach((member, index) => {
                        const memberElements = document.querySelectorAll('.team-member');
                        if (memberElements[index]) {
                            memberElements[index].querySelector('.member-name').value = member.name || '';
                            memberElements[index].querySelector('.member-ra').value = member.ra || '';
                            memberElements[index].querySelector('.member-role').value = member.role || '';
                        }
                    });
                }
            }
        }

        function generateCollectivePDFReport() {
            // Implementação similar à do formulário principal
            alert('Funcionalidade de PDF será implementada');
        }

        function printReport() {
            window.print();
        }

        // Carregar dados salvos ao iniciar
        loadCollectiveReport();
    </script>
